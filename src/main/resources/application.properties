spring.application.name=ecommerce-backend-assignment

# H2 Database
spring.datasource.url=jdbc:h2:mem:ecommercedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Config
app.jwt.secret=my-super-secret-key-for-ecommerce-backend-jwt-signing-2024-please-change-in-prod
app.jwt.expiration-ms=86400000

# Stripe Config (Test Keys - replace with real test key)
stripe.api.key=sk_test_YOUR_STRIPE_TEST_SECRET_KEY

# Logging
logging.level.com.example.ecommerce=DEBUG
